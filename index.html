<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10,000 Bones Operations</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: "Segoe UI", system-ui, sans-serif; margin: 0; color: #2c2c2a; background: #fdfcfa; }
  header { padding: 12px 18px; border-bottom: 1px solid #e2e0d8; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  h1 { font-size: 17px; font-weight: 600; margin: 0; }
  .ver { font-size: 11px; font-weight: 400; color: #999; margin-left: 6px; }
  .conn { font-size: 12.5px; color: #5f5e5a; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #bbb; margin-right: 5px; vertical-align: middle; }
  .dot.ok { background: #1aa34a; } .dot.bad { background: #c0392b; }
  .setup { padding: 16px 18px; background: #f1efe8; border-bottom: 1px solid #e2e0d8; }
  .setup.hidden { display: none; }
  .setup .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px; }
  input { padding: 8px 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; font-family: Consolas, monospace; }
  input.url { width: 320px; } input.key { width: 320px; } input.gid { width: 80px; }
  button { font-size: 13px; padding: 9px 16px; border-radius: 6px; border: 1px solid #157a5a; background: #1D9E75; color: #fff; cursor: pointer; }
  button:hover { background: #178a64; }
  button.sec { background: #fff; color: #2c2c2a; border: 1px solid #bbb; }
  button.sec:hover { background: #f3f3f3; }
  .main { display: flex; gap: 16px; padding: 14px 18px; align-items: flex-start; flex-wrap: wrap; }
  #board { background: #eaf0e4; border: 1px solid #d8e2cf; border-radius: 10px; padding: 6px; overflow: auto; max-width: 100%; flex: 1; min-width: 320px; }
  svg { display: block; }
  .hex { stroke: rgba(0,0,0,0.2); stroke-width: 1; cursor: pointer; }
  .hex:hover { stroke: #ffc800; stroke-width: 2.5; }
  .hex.sel { stroke: #ffc800; stroke-width: 4; }
  .road { stroke: #6b4a26; stroke-width: 3.5; stroke-linecap: round; pointer-events: none; }
  .edge-river { stroke: #2f6fb0; stroke-width: 5; pointer-events: none; stroke-linecap: round; }
  .edge-stream { stroke: #79b3e0; stroke-width: 3; stroke-dasharray: 4 3; pointer-events: none; stroke-linecap: round; }
  .edge-bridge { stroke: #6b4a26; stroke-width: 6; pointer-events: none; }
  .edge-ford { stroke: #c9a24a; stroke-width: 4; stroke-dasharray: 2 3; pointer-events: none; stroke-linecap: round; }
  .settle { pointer-events: none; }
  .settle-label { font-size: 8px; fill: #fff; text-anchor: middle; pointer-events: none; font-weight: 700; }
  .sidebar { width: 270px; flex-shrink: 0; }
  .card { background: #f1efe8; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; line-height: 1.5; }
  .card b { font-weight: 600; }
  .status { font-size: 13px; padding: 10px 14px; margin: 0 18px 14px; border-radius: 6px; }
  .status.ok { background: #d6efdc; color: #176b34; }
  .status.bad { background: #f8d7da; color: #842029; }
  .status.info { background: #eef3f8; color: #355; }
  .muted { color: #888; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>10,000 Bones Operations <span class="ver">v0.7.0</span></h1>
  <span class="conn"><span class="dot" id="connDot"></span><span id="connText">not connected</span></span>
  <span class="conn" id="whoami" style="display:none"></span>
  <button class="sec" id="logoutBtn" style="display:none">Log out</button>
  <button class="sec" id="editConn" style="margin-left:auto">Connection settings</button>
</header>

<div class="setup" id="setup">
  <div class="row">
    <div><label>Supabase Project URL</label><input class="url" id="url" placeholder="https://xxxx.supabase.co"></div>
    <div><label>anon public key</label><input class="key" id="key" placeholder="eyJhbG..."></div>
    <div><label>Game ID</label><input class="gid" id="gid" value="1"></div>
    <button id="connectBtn">Connect</button>
  </div>
  <div class="muted" style="margin-top:8px">Values stay in this page only.</div>
</div>

<div class="setup" id="authPanel" style="display:none">
  <div class="row">
    <div><label>Email</label><input id="email" type="email" placeholder="you@example.com" style="width:240px;font-family:inherit"></div>
    <div><label>Password</label><input id="password" type="password" placeholder="6+ characters" style="width:200px;font-family:inherit"></div>
    <button id="loginBtn">Log in</button>
    <button class="sec" id="signupBtn">Sign up</button>
  </div>
  <div class="row" style="margin-top:10px">
    <div><label>Display name (to join a game)</label><input id="displayName" placeholder="e.g. Commander Vance" style="width:240px;font-family:inherit"></div>
    <div><label>Side color</label><input id="sideColor" type="color" value="#1D6FB8" style="width:54px;padding:2px;height:36px"></div>
    <button class="sec" id="joinBtn">Join / resume this game</button>
  </div>
  <div class="muted" id="authMsg" style="margin-top:8px"></div>
</div>

<div class="status info" id="status">Enter your connection details above and click Connect.</div>

<div class="main" id="mainArea" style="display:none">
  <div id="board"><svg id="grid"></svg></div>
  <div class="sidebar">
    <div class="card" id="draftPanel" style="display:none">
      <b>Draft — buy your army</b>
      <div id="budgetLine" style="margin:8px 0;font-size:12.5px"></div>
      <div id="catalogList" style="margin:8px 0"></div>
      <div id="cartLine" style="font-size:12.5px;color:#5f5e5a;margin:6px 0"></div>
      <button id="confirmBuy" style="width:100%;margin-top:4px">Confirm purchases</button>
      <div id="buyMsg" class="muted" style="margin-top:8px"></div>
    </div>
    <div class="card" id="info"><b>Click a hex or unit</b><br>Details show here.</div>
    <div class="card" id="planCard" style="display:none">
      <b>Movement order</b>
      <div id="planUnit" style="margin:6px 0;font-size:12.5px"></div>
      <div style="font-size:13px;margin:6px 0">Points left: <b id="mpLeft">—</b></div>
      <div id="planPath" style="font-size:12.5px;color:#5f5e5a;line-height:1.6">No path yet.</div>
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        <button class="sec" id="undoStep" style="flex:1">Undo step</button>
        <button class="sec" id="clearPath" style="flex:1">Clear</button>
      </div>
      <button id="saveOrder" style="width:100%;margin-top:6px">Save move order</button>
      <button class="sec" id="cancelPlan" style="width:100%;margin-top:6px">Deselect unit</button>
    </div>
    <div class="card" id="counts"></div>
    <div class="card" id="readyCard">
      <b>Turn status</b>
      <div id="playerReadyList" style="margin:8px 0;font-size:12.5px;line-height:1.7"></div>
      <div id="myOrderSummary" style="font-size:12.5px;color:#5f5e5a;margin:6px 0"></div>
      <button id="commitBtn" style="width:100%;margin-top:4px">Commit &amp; ready</button>
      <button class="sec" id="uncommitBtn" style="width:100%;margin-top:6px;display:none">Un-commit (edit orders)</button>
    </div>
    <button class="sec" id="reloadBtn" style="width:100%">Reload from database</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ---------- constants ----------
var SIZE = 24;
var TERR = {
  plains:{name:'Plains',color:'#9ec96a'}, forest:{name:'Forest',color:'#4a8a44'},
  hills:{name:'Hills',color:'#b39a64'}, mountains:{name:'Mountains',color:'#8f8f94'},
  rough:{name:'Rough',color:'#c2b083'}, swamp:{name:'Swamp',color:'#6f8f6a'},
  sand:{name:'Sand',color:'#e3d18a'}, water:{name:'Water',color:'#5a8fb0'}
};
var TERR_MOVE = { plains:1, forest:2, hills:2, mountains:3, rough:2, swamp:3, sand:2, water:99 };
var SETTLE_ABBR = { village:'V', town:'T', city:'C' };
var NEIGHBORS = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];

// ---------- state ----------
var supa=null, tiles=[], edges=[], forces=[], myOrders=[], orderedForceIds={}, allPlayers=[], byKey={}, selected=null;
var currentUser=null, currentPlayer=null;
var planUnit=null, planType=null, planPath=[];
var catalog=[], cart={}, gamePhase=null;  // draft shopping: cart is held client-side per design §8

// ---------- helpers ----------
function getSupabaseLib(){
  if (window.supabase && window.supabase.createClient) return window.supabase;
  if (window.Supabase && window.Supabase.createClient) return window.Supabase;
  return null;
}
function setStatus(msg, kind){
  var s=document.getElementById('status');
  s.className='status '+(kind||'info'); s.textContent=msg; s.style.display='block';
}
function setConn(ok, text){
  document.getElementById('connDot').className='dot '+(ok?'ok':'bad');
  document.getElementById('connText').textContent=text;
}
function authMsg(m){ document.getElementById('authMsg').textContent = m||''; }
function hexPos(q,r){ return {x:SIZE*Math.sqrt(3)*(q+r/2), y:SIZE*1.5*r}; }
function corner(cx,cy,i){ var a=Math.PI/180*(60*i-30); return {x:cx+SIZE*Math.cos(a), y:cy+SIZE*Math.sin(a)}; }
function isAdjacent(a,b){ return NEIGHBORS.some(function(o){ return a.q+o[0]===b.q && a.r+o[1]===b.r; }); }
function sharedCorners(a,b,ox,oy){
  var pa=hexPos(a.q,a.r), pb=hexPos(b.q,b.r), ca=[], cb=[];
  for(var i=0;i<6;i++){ ca.push(corner(ox(pa),oy(pa),i)); cb.push(corner(ox(pb),oy(pb),i)); }
  var sh=[];
  ca.forEach(function(p1){ cb.forEach(function(p2){ if(Math.abs(p1.x-p2.x)<1.5&&Math.abs(p1.y-p2.y)<1.5) sh.push(p1); }); });
  return sh.length===2 ? sh : null;
}

// ---------- event wiring ----------
document.getElementById('editConn').addEventListener('click', function(){ document.getElementById('setup').classList.toggle('hidden'); });
document.getElementById('connectBtn').addEventListener('click', connect);
document.getElementById('loginBtn').addEventListener('click', function(){ doAuth('login'); });
document.getElementById('signupBtn').addEventListener('click', function(){ doAuth('signup'); });
document.getElementById('joinBtn').addEventListener('click', joinGame);
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('reloadBtn').addEventListener('click', loadMap);
document.getElementById('undoStep').addEventListener('click', function(){ if(planPath.length>1){ planPath.pop(); renderPlan(); render(); } });
document.getElementById('clearPath').addEventListener('click', function(){ if(planUnit){ planPath=[{q:planUnit.q,r:planUnit.r}]; renderPlan(); render(); } });
document.getElementById('cancelPlan').addEventListener('click', function(){ endPlanning(); render(); });
document.getElementById('saveOrder').addEventListener('click', saveOrder);
document.getElementById('commitBtn').addEventListener('click', commitOrders);
document.getElementById('uncommitBtn').addEventListener('click', uncommitOrders);
document.getElementById('catalogList').addEventListener('click', function(e){
  var btn=e.target.closest('.shopbtn'); if(!btn) return;
  changeCart(btn.getAttribute('data-id'), btn.getAttribute('data-act'));
});
document.getElementById('confirmBuy').addEventListener('click', confirmPurchases);

// ---------- connection & auth ----------
async function connect(){
  var url=document.getElementById('url').value.trim().replace(/\/+$/,'');
  var key=document.getElementById('key').value.trim();
  if(!url||!key){ setStatus('Enter both the Project URL and anon key.','bad'); return; }
  var lib=getSupabaseLib();
  if(!lib){ setConn(false,'library not loaded'); setStatus('Supabase library did not load. Open this page over http/https, not as a local file.','bad'); return; }
  try{
    supa = lib.createClient(url, key, { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:false, storage:window.localStorage } });
    setConn(true,'connected');
    document.getElementById('setup').classList.add('hidden');
    var sess = await supa.auth.getSession();
    if(sess.data && sess.data.session){ currentUser = sess.data.session.user; onLoggedIn(); }
    else { document.getElementById('authPanel').style.display='block'; setStatus('Connected. Please log in or sign up.','info'); }
  }catch(e){ setConn(false,'connection failed'); setStatus('Could not create client: '+e.message,'bad'); }
}

async function doAuth(kind){
  if(!supa){ authMsg('Connect first.'); return; }
  var email=document.getElementById('email').value.trim();
  var pw=document.getElementById('password').value;
  if(!email||!pw){ authMsg('Enter email and password.'); return; }
  authMsg(kind==='signup'?'Creating account…':'Logging in…');
  try{
    var res = kind==='signup'
      ? await supa.auth.signUp({ email:email, password:pw })
      : await supa.auth.signInWithPassword({ email:email, password:pw });
    if(res.error) throw res.error;
    if(kind==='signup' && !res.data.session){ authMsg('Account created. If email confirmation is on, check your inbox; otherwise click Log in.'); return; }
    currentUser = res.data.user || (res.data.session && res.data.session.user);
    authMsg(''); onLoggedIn();
  }catch(e){ authMsg('Auth failed: '+(e.message||e)); }
}

async function onLoggedIn(){
  document.getElementById('whoami').style.display='';
  document.getElementById('whoami').textContent='· '+currentUser.email;
  document.getElementById('logoutBtn').style.display='';
  var gid=+document.getElementById('gid').value||1;
  var pr = await supa.from('players').select('*').eq('game_id',gid).eq('user_id',currentUser.id).maybeSingle();
  if(pr.data){
    currentPlayer = pr.data;
    document.getElementById('authPanel').style.display='none';
    setStatus('Logged in as '+currentPlayer.display_name+'. Loading map…','info');
    await loadMap();
  } else {
    document.getElementById('authPanel').style.display='block';
    setStatus('Logged in. You are not yet a player in game '+gid+' — set a display name and Join.','info');
  }
}

async function joinGame(){
  if(!currentUser){ authMsg('Log in first.'); return; }
  var gid=+document.getElementById('gid').value||1;
  var name=document.getElementById('displayName').value.trim()||currentUser.email.split('@')[0];
  var color=document.getElementById('sideColor').value;
  authMsg('Joining game '+gid+'…');
  try{
    var ins = await supa.from('players').insert({
      game_id:gid, user_id:currentUser.id, display_name:name, color_hex:color, turn_order:1, points_budget:100
    }).select().single();
    if(ins.error) throw ins.error;
    currentPlayer = ins.data;
    authMsg(''); document.getElementById('authPanel').style.display='none';
    setStatus('Joined as '+name+'. Loading map…','info');
    await loadMap();
  }catch(e){ authMsg('Join failed: '+(e.message||e)); }
}

async function logout(){
  if(supa) await supa.auth.signOut();
  currentUser=null; currentPlayer=null;
  document.getElementById('whoami').style.display='none';
  document.getElementById('logoutBtn').style.display='none';
  document.getElementById('mainArea').style.display='none';
  document.getElementById('authPanel').style.display='block';
  setStatus('Logged out.','info');
}

// ---------- data load ----------
async function loadMap(){
  if(!supa){ setStatus('Not connected yet.','bad'); return; }
  var gid=+document.getElementById('gid').value||1;
  setStatus('Loading map for game '+gid+'…','info');
  try{
    var tRes = await supa.from('tiles').select('*').eq('game_id',gid);
    if(tRes.error) throw tRes.error;
    var eRes = await supa.from('edges').select('*').eq('game_id',gid);
    var fRes = await supa.from('forces')
      .select('*, unit_types(name, movement, attack, defense, attack_range, sight_range, is_armored, stack_cost, restricted_terrain), players(color_hex, display_name)')
      .eq('game_id',gid);
    tiles = tRes.data||[];
    edges = (eRes.error?[]:(eRes.data||[]));
    forces = (fRes.error?[]:(fRes.data||[]));

    myOrders=[];
    if(currentPlayer){
      var oRes = await supa.from('orders').select('*')
        .eq('game_id',gid).eq('player_id',currentPlayer.id).in('status',['draft','committed']);
      if(!oRes.error) myOrders = oRes.data||[];
    }
    orderedForceIds={};
    myOrders.forEach(function(o){ orderedForceIds[Number(o.force_id)]=true; });

    var pRes = await supa.from('players').select('id, display_name, color_hex, ready, is_eliminated').eq('game_id',gid);
    allPlayers = (pRes.error?[]:(pRes.data||[]));
    if(currentPlayer){
      var me = allPlayers.find(function(p){ return p.id===currentPlayer.id; });
      if(me) currentPlayer.ready = me.ready;
    }

    // game phase (drives draft vs. play view) and the unit catalog for shopping
    var gRes = await supa.from('games').select('phase, turn_number').eq('id',gid).maybeSingle();
    gamePhase = (gRes.data && gRes.data.phase) || null;
    // catalog is queried without a game filter (assumes a global unit_types table)
    var cRes = await supa.from('unit_types').select('*');
    catalog = (cRes.error?[]:(cRes.data||[])).slice().sort(function(a,b){ return unitCost(a)-unitCost(b); });

    if(tiles.length===0){
      setStatus('Connected, but no tiles for game '+gid+'. Check the Game ID.','bad');
      document.getElementById('mainArea').style.display='none';
      return;
    }
    byKey={}; tiles.forEach(function(t){ byKey[t.q+','+t.r]=t; });
    document.getElementById('mainArea').style.display='flex';
    render(); renderReadyPanel(); updateDraftView();
    setStatus('Map loaded: '+tiles.length+' tiles, '+forces.length+' units, '+myOrders.length+' orders placed.','ok');
  }catch(e){
    setStatus('Load failed: '+(e.message||e),'bad');
  }
}

// ---------- rendering ----------
function render(){
  var svg=document.getElementById('grid');
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  tiles.forEach(function(t){ var p=hexPos(t.q,t.r); minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y); });
  var pad=SIZE+4, W=(maxX-minX)+pad*2, H=(maxY-minY)+pad*2;
  svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('width',W); svg.setAttribute('height',H);
  function ox(p){return p.x-minX+pad;} function oy(p){return p.y-minY+pad;}

  // helper: draw a route as a dashed line with a start dot and an arrowhead
  function drawRoute(coords, color){
    if(coords.length<2) return;
    var poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    poly.setAttribute('points', coords.map(function(c){return c.x.toFixed(1)+','+c.y.toFixed(1);}).join(' '));
    poly.setAttribute('fill','none'); poly.setAttribute('stroke',color); poly.setAttribute('stroke-width','3');
    poly.setAttribute('stroke-linejoin','round'); poly.setAttribute('stroke-linecap','round');
    poly.setAttribute('stroke-dasharray','6 4'); poly.setAttribute('pointer-events','none');
    svg.appendChild(poly);
    var s=coords[0];
    var sd=document.createElementNS('http://www.w3.org/2000/svg','circle');
    sd.setAttribute('cx',s.x);sd.setAttribute('cy',s.y);sd.setAttribute('r',3.5);
    sd.setAttribute('fill',color);sd.setAttribute('pointer-events','none');svg.appendChild(sd);
    var a=coords[coords.length-2], b=coords[coords.length-1], ang=Math.atan2(b.y-a.y,b.x-a.x), ah=9;
    var arr=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    arr.setAttribute('points', b.x.toFixed(1)+','+b.y.toFixed(1)+' '+
      (b.x-ah*Math.cos(ang-Math.PI/6)).toFixed(1)+','+(b.y-ah*Math.sin(ang-Math.PI/6)).toFixed(1)+' '+
      (b.x-ah*Math.cos(ang+Math.PI/6)).toFixed(1)+','+(b.y-ah*Math.sin(ang+Math.PI/6)).toFixed(1));
    arr.setAttribute('fill',color);arr.setAttribute('pointer-events','none');svg.appendChild(arr);
  }
  function pathToCoords(p){ var t=byKey[p.q+','+p.r]; if(!t) return null; var pos=hexPos(t.q,t.r); return {x:ox(pos),y:oy(pos)}; }

  // hexes
  tiles.forEach(function(t){
    var p=hexPos(t.q,t.r), cx=ox(p), cy=oy(p), pts=[];
    for(var i=0;i<6;i++){ var cn=corner(cx,cy,i); pts.push(cn.x.toFixed(1)+','+cn.y.toFixed(1)); }
    var poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',pts.join(' '));
    poly.setAttribute('fill',(TERR[t.terrain]||TERR.plains).color);
    poly.setAttribute('class','hex'+(selected&&selected.q===t.q&&selected.r===t.r?' sel':''));
    poly.addEventListener('click',function(){ if(planUnit){ tryExtendPath(t); } else { selected=t; render(); showInfo(t); } });
    svg.appendChild(poly);
    // planning shade
    if(planUnit){
      var onPath = planPath.some(function(pp){ return pp.q===t.q&&pp.r===t.r; });
      var last = planPath[planPath.length-1];
      var legal = last && isAdjacent(last,t) && !onPath && (TERR_MOVE[t.terrain]||1)<99 && (pathCost()+(TERR_MOVE[t.terrain]||1))<=(planType.movement||0);
      if(onPath||legal){
        var shade=document.createElementNS('http://www.w3.org/2000/svg','polygon');
        shade.setAttribute('points',pts.join(' '));
        shade.setAttribute('fill', onPath?'rgba(255,200,0,0.5)':'rgba(26,163,74,0.35)');
        shade.setAttribute('pointer-events','none');
        svg.appendChild(shade);
      }
    }
  });

  // roads
  tiles.forEach(function(t){
    if(!t.has_road) return;
    var p=hexPos(t.q,t.r), cx=ox(p), cy=oy(p);
    NEIGHBORS.forEach(function(o){
      var nb=byKey[(t.q+o[0])+','+(t.r+o[1])];
      if(nb&&nb.has_road&&(nb.q>t.q||(nb.q===t.q&&nb.r>t.r))){
        var np=hexPos(nb.q,nb.r);
        var ln=document.createElementNS('http://www.w3.org/2000/svg','line');
        ln.setAttribute('x1',cx);ln.setAttribute('y1',cy);ln.setAttribute('x2',ox(np));ln.setAttribute('y2',oy(np));
        ln.setAttribute('class','road'); svg.appendChild(ln);
      }
    });
  });

  // edges
  edges.forEach(function(e){
    var a=byKey[e.a_q+','+e.a_r], b=byKey[e.b_q+','+e.b_r]; if(!a||!b) return;
    var sc=sharedCorners(a,b,ox,oy); if(!sc) return;
    var ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',sc[0].x);ln.setAttribute('y1',sc[0].y);ln.setAttribute('x2',sc[1].x);ln.setAttribute('y2',sc[1].y);
    ln.setAttribute('class','edge-'+e.type); svg.appendChild(ln);
  });

  // settlements
  tiles.forEach(function(t){
    if(!t.settlement||t.settlement==='none') return;
    var p=hexPos(t.q,t.r), cx=ox(p), cy=oy(p);
    var sym=t.settlement==='city'?9:t.settlement==='town'?7:5;
    var rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',cx-sym);rect.setAttribute('y',cy-sym);rect.setAttribute('width',sym*2);rect.setAttribute('height',sym*2);
    rect.setAttribute('rx',2);rect.setAttribute('fill','rgba(40,30,20,0.8)');rect.setAttribute('class','settle');svg.appendChild(rect);
    var lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',cx);lbl.setAttribute('y',cy+3);lbl.setAttribute('class','settle-label');
    lbl.textContent=SETTLE_ABBR[t.settlement]||''; svg.appendChild(lbl);
  });

  // ordered routes — drawn on top of terrain so they're clearly visible
  if(planUnit){
    drawRoute(planPath.map(pathToCoords).filter(Boolean), 'rgba(214,158,0,0.95)');
  } else {
    myOrders.forEach(function(o){
      if(!o.path) return;
      var coords=o.path.split(',').map(function(step){ var qr=step.split(':'); return pathToCoords({q:+qr[0],r:+qr[1]}); }).filter(Boolean);
      drawRoute(coords, 'rgba(214,158,0,0.9)');
    });
  }

  // units
  forces.forEach(function(f){
    var t=byKey[f.q+','+f.r]; if(!t) return;
    var p=hexPos(f.q,f.r), cx=ox(p), cy=oy(p);
    var color=(f.players&&f.players.color_hex)||'#444';
    var g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    var w=SIZE*0.95, h=SIZE*0.62;
    var rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',cx-w/2);rect.setAttribute('y',cy-h/2);rect.setAttribute('width',w);rect.setAttribute('height',h);
    rect.setAttribute('rx',3);rect.setAttribute('fill',color);rect.setAttribute('stroke','#fff');rect.setAttribute('stroke-width','1.5');
    g.appendChild(rect);
    var nm=(f.unit_types&&f.unit_types.name)||'?';
    var ini=document.createElementNS('http://www.w3.org/2000/svg','text');
    ini.setAttribute('x',cx-w/2+5);ini.setAttribute('y',cy+3);ini.setAttribute('font-size','9');ini.setAttribute('font-weight','700');ini.setAttribute('fill','#fff');
    ini.textContent=nm.charAt(0); g.appendChild(ini);
    var str=document.createElementNS('http://www.w3.org/2000/svg','text');
    str.setAttribute('x',cx+w/2-5);str.setAttribute('y',cy+3);str.setAttribute('text-anchor','end');str.setAttribute('font-size','9');str.setAttribute('font-weight','700');str.setAttribute('fill','#fff');
    str.textContent=f.strength; g.appendChild(str);
    // order checkmark
    if(orderedForceIds[Number(f.id)]===true){
      var bc=document.createElementNS('http://www.w3.org/2000/svg','circle');
      bc.setAttribute('cx',cx+w/2);bc.setAttribute('cy',cy-h/2);bc.setAttribute('r',7);bc.setAttribute('fill','#1aa34a');bc.setAttribute('stroke','#fff');bc.setAttribute('stroke-width','1.5');
      g.appendChild(bc);
      var ck=document.createElementNS('http://www.w3.org/2000/svg','text');
      ck.setAttribute('x',cx+w/2);ck.setAttribute('y',cy-h/2+3.5);ck.setAttribute('text-anchor','middle');ck.setAttribute('font-size','10');ck.setAttribute('font-weight','700');ck.setAttribute('fill','#fff');
      ck.textContent='✓'; g.appendChild(ck);
    }
    g.addEventListener('click',function(ev){ ev.stopPropagation();
      if(currentPlayer && f.owner_player_id===currentPlayer.id){ startPlanning(f); } else { showUnitInfo(f); }
    });
    svg.appendChild(g);
  });

  // counts
  var roads=0,set={village:0,town:0,city:0};
  tiles.forEach(function(t){ if(t.has_road)roads++; if(t.settlement&&t.settlement!=='none')set[t.settlement]++; });
  document.getElementById('counts').innerHTML='<b>Map summary</b><br>'+tiles.length+' tiles · '+roads+' road · '+set.city+' cities, '+set.town+' towns, '+set.village+' villages';
}

function showInfo(t){
  document.getElementById('info').innerHTML='<b>Hex ('+t.q+', '+t.r+')</b><br>Terrain: '+((TERR[t.terrain]||{name:t.terrain}).name)+
    '<br>Settlement: '+(t.settlement==='none'?'—':t.settlement)+'<br>Road: '+(t.has_road?'yes':'no')+'<br>Status: '+t.status;
}
function showUnitInfo(f){
  var nm=(f.unit_types&&f.unit_types.name)||'Unknown';
  var owner=(f.players&&f.players.display_name)||('player '+f.owner_player_id);
  document.getElementById('info').innerHTML='<b>'+nm+'</b><br>Owner: '+owner+'<br>Location: ('+f.q+', '+f.r+')<br>Strength: '+f.strength+
    '<br>Morale: '+f.morale+'<br>Ammo: '+(f.ammo<0?'∞':f.ammo);
}

// ---------- planning ----------
function startPlanning(f){
  if(currentPlayer && currentPlayer.ready){ setStatus('You are committed. Click "Un-commit" to edit orders.','info'); return; }
  planUnit=f; planType=f.unit_types||{};
  // Load an existing saved order for this unit so move points and the plotted
  // path reflect what's already saved, instead of starting from scratch.
  var existing=myOrders.find(function(o){ return Number(o.force_id)===Number(f.id) && o.path; });
  if(existing){
    planPath=existing.path.split(',').map(function(step){ var qr=step.split(':'); return {q:parseInt(qr[0],10), r:parseInt(qr[1],10)}; });
    // Safety: the path must begin at the unit's current hex; otherwise start fresh.
    if(!planPath.length || planPath[0].q!==f.q || planPath[0].r!==f.r){ planPath=[{q:f.q,r:f.r}]; }
  } else {
    planPath=[{q:f.q,r:f.r}];
  }
  document.getElementById('planCard').style.display='block';
  document.getElementById('planUnit').innerHTML='<b>'+((planType.name)||'Unit')+'</b> at ('+f.q+','+f.r+') · movement '+(planType.movement!=null?planType.movement:'?');
  renderPlan(); render();
}
function endPlanning(){ planUnit=null; planType=null; planPath=[]; document.getElementById('planCard').style.display='none'; }
function pathCost(){
  var c=0;
  for(var i=1;i<planPath.length;i++){ var t=byKey[planPath[i].q+','+planPath[i].r]; c += t?(TERR_MOVE[t.terrain]||1):1; }
  return c;
}
function tryExtendPath(t){
  for(var i=0;i<planPath.length;i++){ if(planPath[i].q===t.q&&planPath[i].r===t.r){ planPath=planPath.slice(0,i+1); renderPlan(); render(); return; } }
  var last=planPath[planPath.length-1];
  if(!isAdjacent(last,t)) return;
  var dest=byKey[t.q+','+t.r];
  if(!dest||(TERR_MOVE[dest.terrain]||1)>=99) return;
  if(pathCost()+(TERR_MOVE[dest.terrain]||1) > (planType.movement||0)) return;
  planPath.push({q:t.q,r:t.r}); renderPlan(); render();
}
function renderPlan(){
  var move=planType&&planType.movement!=null?planType.movement:0;
  document.getElementById('mpLeft').textContent=(move-pathCost());
  var el=document.getElementById('planPath');
  if(planPath.length<=1){ el.textContent='No path yet — tap an adjacent hex.'; }
  else { el.innerHTML=planPath.map(function(p,i){ if(i===0) return 'Start ('+p.q+','+p.r+')'; var t=byKey[p.q+','+p.r]; return i+'. ('+p.q+','+p.r+') −'+(t?(TERR_MOVE[t.terrain]||1):1); }).join('<br>'); }
}
async function saveOrder(){
  if(!planUnit||planPath.length<2){ setStatus('Plot a path first (tap adjacent hexes).','bad'); return; }
  var gid=+document.getElementById('gid').value||1;
  var pathStr=planPath.map(function(p){ return p.q+':'+p.r; }).join(',');
  setStatus('Saving move order…','info');
  try{
    await supa.from('orders').delete().eq('game_id',gid).eq('player_id',currentPlayer.id).eq('force_id',planUnit.id).eq('status','draft');
    var ins=await supa.from('orders').insert({ game_id:gid, player_id:currentPlayer.id, turn_number:0, force_id:planUnit.id, order_type:'move', path:pathStr, status:'draft' }).select().single();
    if(ins.error) throw ins.error;
    setStatus('Move order saved: '+pathStr,'ok');
    endPlanning(); await loadMap();
  }catch(e){ setStatus('Save failed: '+(e.message||e),'bad'); }
}

// ---------- draft: shopping step (cart held client-side per design §8) ----------
function unitCost(u){ return (u && u.build_cost!=null) ? u.build_cost : (u && u.cost!=null ? u.cost : 0); }
function cartCount(){ return Object.keys(cart).reduce(function(s,id){ return s+cart[id]; }, 0); }
function cartTotal(){
  return Object.keys(cart).reduce(function(s,id){
    var u=catalog.find(function(x){ return String(x.id)===String(id); });
    return s + (u ? unitCost(u)*cart[id] : 0);
  }, 0);
}
function updateDraftView(){
  var isDraft = gamePhase==='draft';
  document.getElementById('draftPanel').style.display = isDraft ? '' : 'none';
  // hide play-only controls during the draft
  document.getElementById('readyCard').style.display = isDraft ? 'none' : '';
  if(isDraft){ endPlanning(); renderShop(); }
}
function renderShop(){
  var budget = (currentPlayer && currentPlayer.points_budget) || 0;
  var spent = cartTotal();
  document.getElementById('budgetLine').innerHTML =
    'Budget <b>'+budget+'</b> · Spent <b>'+spent+'</b> · Remaining <b>'+(budget-spent)+'</b>';
  var rows = catalog.map(function(u){
    var qty = cart[u.id]||0, cost = unitCost(u);
    var stats = 'A'+u.attack+'/D'+u.defense+' · move '+u.movement+' · rng '+u.attack_range;
    return '<div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #e2e0d8">'+
      '<div style="flex:1"><b>'+u.name+'</b> <span class="muted">('+cost+' pts)</span><br>'+
      '<span class="muted" style="font-size:11px">'+stats+'</span></div>'+
      '<button class="sec shopbtn" data-act="minus" data-id="'+u.id+'" style="padding:4px 10px">−</button>'+
      '<span style="min-width:18px;text-align:center">'+qty+'</span>'+
      '<button class="sec shopbtn" data-act="plus" data-id="'+u.id+'" style="padding:4px 10px">+</button></div>';
  }).join('');
  document.getElementById('catalogList').innerHTML = rows || '<span class="muted">No units in catalog (check the unit_types table).</span>';
  var n = cartCount();
  document.getElementById('cartLine').textContent = n+' unit'+(n===1?'':'s')+' in cart · '+spent+' pts.';
  document.getElementById('confirmBuy').disabled = (n===0 || spent>budget);
}
function changeCart(id, act){
  var u = catalog.find(function(x){ return String(x.id)===String(id); }); if(!u) return;
  var budget = (currentPlayer && currentPlayer.points_budget) || 0;
  if(act==='plus'){
    if(cartTotal()+unitCost(u) > budget){ document.getElementById('buyMsg').textContent='Not enough points for another '+u.name+'.'; return; }
    cart[u.id] = (cart[u.id]||0)+1; document.getElementById('buyMsg').textContent='';
  } else {
    cart[u.id] = Math.max(0,(cart[u.id]||0)-1); if(!cart[u.id]) delete cart[u.id];
  }
  renderShop();
}
function confirmPurchases(){
  if(cartCount()===0) return;
  document.getElementById('buyMsg').innerHTML = '✓ Purchases confirmed: '+cartCount()+' units, '+cartTotal()+
    ' pts. Deployment step is next — your cart is held in this page until you place the units.';
}

// ---------- commit / ready ----------
function renderReadyPanel(){
  if(!document.getElementById('readyCard')) return;
  var listHtml=allPlayers.filter(function(p){ return !p.is_eliminated; }).map(function(p){
    var isMe=currentPlayer&&p.id===currentPlayer.id;
    var dot=p.ready?'<span style="color:#1aa34a;font-weight:700">● ready</span>':'<span style="color:#c0392b">○ planning</span>';
    return '<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+(p.color_hex||'#888')+';margin-right:6px;vertical-align:middle"></span>'+p.display_name+(isMe?' (you)':'')+' — '+dot;
  }).join('<br>');
  document.getElementById('playerReadyList').innerHTML=listHtml||'No players.';
  document.getElementById('myOrderSummary').textContent=myOrders.length+' order'+(myOrders.length===1?'':'s')+' placed.';
  var meReady=currentPlayer&&currentPlayer.ready;
  document.getElementById('commitBtn').style.display=meReady?'none':'';
  document.getElementById('uncommitBtn').style.display=meReady?'':'none';
}
async function commitOrders(){
  if(!currentPlayer){ setStatus('Not in a game.','bad'); return; }
  var gid=+document.getElementById('gid').value||1;
  setStatus('Committing orders…','info');
  try{
    await supa.from('orders').update({status:'committed'}).eq('game_id',gid).eq('player_id',currentPlayer.id).eq('status','draft');
    var up=await supa.from('players').update({ready:true}).eq('id',currentPlayer.id).select().single();
    if(up.error) throw up.error;
    currentPlayer.ready=true;
    setStatus('Orders committed — you are ready.','ok');
    // check if everyone is now ready -> resolve the turn
    var resolved = await maybeResolveTurn(gid);
    if(!resolved) await loadMap();
  }catch(e){ setStatus('Commit failed: '+(e.message||e),'bad'); }
}
async function uncommitOrders(){
  if(!currentPlayer) return;
  var gid=+document.getElementById('gid').value||1;
  setStatus('Re-opening your orders…','info');
  try{
    await supa.from('orders').update({status:'draft'}).eq('game_id',gid).eq('player_id',currentPlayer.id).eq('status','committed');
    var up=await supa.from('players').update({ready:false}).eq('id',currentPlayer.id).select().single();
    if(up.error) throw up.error;
    currentPlayer.ready=false;
    setStatus('Orders re-opened for editing.','info');
    await loadMap();
  }catch(e){ setStatus('Un-commit failed: '+(e.message||e),'bad'); }
}

// ---------- turn resolution (movement only, this pass) ----------
async function maybeResolveTurn(gid){
  // are all non-eliminated players ready?
  var pRes = await supa.from('players').select('id, ready, is_eliminated').eq('game_id',gid);
  if(pRes.error) return false;
  var active = (pRes.data||[]).filter(function(p){ return !p.is_eliminated; });
  if(active.length===0) return false;
  var allReady = active.every(function(p){ return p.ready; });
  if(!allReady) return false;

  // claim the resolve by flipping game phase to 'resolving' (guard against double-run)
  var gRes = await supa.from('games').select('id, phase, turn_number').eq('id',gid).single();
  if(gRes.error) return false;
  if(gRes.data.phase==='resolving') return false; // someone else is resolving
  var claim = await supa.from('games').update({phase:'resolving'})
    .eq('id',gid).eq('phase','planning').select();
  // if no row came back, another client already claimed it
  if(claim.error || !claim.data || claim.data.length===0){
    // phase wasn't 'planning' — could be first turn (phase 'draft') ; allow that too
    var claim2 = await supa.from('games').update({phase:'resolving'})
      .eq('id',gid).neq('phase','resolving').select();
    if(claim2.error || !claim2.data || claim2.data.length===0) return false;
  }

  setStatus('All players ready — resolving turn '+gRes.data.turn_number+'…','info');
  await resolveTurn(gid, gRes.data.turn_number);
  return true;
}

async function resolveTurn(gid, turnNumber){
  try{
    // 1. read all committed move orders for this turn (across all players)
    var oRes = await supa.from('orders').select('*')
      .eq('game_id',gid).eq('status','committed').eq('order_type','move');
    var orders = (oRes.error?[]:(oRes.data||[]));

    // 2. apply each move: unit goes to the LAST hex in its path
    for(var i=0;i<orders.length;i++){
      var o = orders[i];
      if(!o.path) continue;
      var steps = o.path.split(',');
      var dest = steps[steps.length-1].split(':');
      var dq = parseInt(dest[0],10), dr = parseInt(dest[1],10);
      await supa.from('forces').update({ q:dq, r:dr }).eq('id', o.force_id);
    }

    // 3. mark all those orders resolved
    await supa.from('orders').update({status:'resolved'})
      .eq('game_id',gid).eq('status','committed');

    // 4. reset ready flags, advance turn, back to planning phase
    await supa.from('players').update({ready:false}).eq('game_id',gid);
    var newTurn = turnNumber + 1;
    await supa.from('games').update({ phase:'planning', turn_number:newTurn }).eq('id',gid);

    setStatus('Turn '+turnNumber+' resolved. Now on turn '+newTurn+'.','ok');
    if(currentPlayer) currentPlayer.ready=false;
    await loadMap();
  }catch(e){
    setStatus('Resolution error: '+(e.message||e),'bad');
    // try to release the resolving lock so the game isn't stuck
    await supa.from('games').update({phase:'planning'}).eq('id',gid);
  }
}
</script>
